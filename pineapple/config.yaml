sensor:
  id: "realtek-8812au-001"
  type: "rssi"

radios:
  radio_dualband:
    interface: "wlx0013eff20502"
    band: "5GHz"
    channels:
      # 2.4 GHz (interleaved for balanced coverage)
      - 1
      - 6
      - 11
      # 5 GHz UNII-1
      - 36
      - 40
      - 44
      - 48
      # 5 GHz UNII-2 (DFS)
      - 52
      - 56
      - 60
      - 64
      # 5 GHz UNII-2 Extended (DFS)
      - 100
      - 104
      - 108
      - 112
      - 116
      - 120
      - 124
      - 128
      - 132
      - 136
      - 140
      - 144
      # 5 GHz UNII-3
      - 149
      - 153
      - 157
      - 161
      - 165
    mode: "monitor"

capture:
  window_seconds: 1
  max_observations_per_window: 10000
  channel_dwell_ms: 200
  buffer_max_size: 50000

transport:
  type: "mqtt"
  mqtt:
    broker: "iot.voicechatai.io"
    port: 8883
    topic: "5map/rssi/{sensor_id}"
    qos: 1
    keepalive: 60
    tls: true
    cert_dir: "/etc/5map/certs"
    ca_cert: "AmazonRootCA1.pem"
    client_cert: "certificate.pem.crt"
    private_key: "private.pem.key"
  queue_max_size: 1000

logging:
  level: "INFO"
  file: "/var/log/5map-agent.log"
  max_bytes: 5242880
  backup_count: 3
