<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5map - Device Proximity</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e17;--card:#131a2b;--border:#1e2d4a;
  --cyan:#00d4ff;--danger:#ff4757;--warn:#ffa502;--success:#2ed573;
  --purple:#a855f7;--blue:#3b82f6;
  --text:#e8eaed;--muted:#8892a4;--dim:#4a5568;
  --font-mono:'SF Mono','Fira Code','Cascadia Code',monospace;
  --font-sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
}
html{font-size:14px;height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);height:100%;display:flex;flex-direction:column;overflow:hidden}
a{color:var(--cyan);text-decoration:none}

/* ---- HEADER ---- */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:56px;flex-shrink:0;
  background:linear-gradient(180deg,#0f1520 0%,var(--bg) 100%);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;
}
.header-left{display:flex;align-items:center;gap:14px}
.logo{font-size:1.5rem;font-weight:800;letter-spacing:-.02em;font-family:var(--font-mono);color:var(--cyan);display:flex;align-items:center;gap:8px}
.logo svg{width:28px;height:28px;fill:var(--cyan)}
.back-link{font-size:.75rem;color:var(--muted);padding:4px 10px;border-radius:6px;border:1px solid transparent;transition:all .15s;display:flex;align-items:center;gap:4px}
.back-link:hover{color:var(--cyan);background:rgba(0,212,255,.06);border-color:rgba(0,212,255,.15)}
.page-title{font-size:.82rem;color:var(--muted);font-family:var(--font-mono)}
.last-update{font-size:.72rem;color:var(--dim);font-family:var(--font-mono)}

/* ---- SUMMARY STRIP ---- */
.summary-strip{
  height:56px;flex-shrink:0;
  background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:0;
  position:sticky;top:56px;z-index:150;
}
.summary-counts{
  display:flex;align-items:center;gap:20px;
  padding:0 20px;border-right:1px solid var(--border);height:100%;
  flex-shrink:0;
}
.count-item{display:flex;flex-direction:column;align-items:center;gap:1px}
.count-val{font-size:1.1rem;font-weight:700;font-family:var(--font-mono);line-height:1}
.count-val.active-val{color:var(--success)}
.count-val.wifi-val{color:var(--cyan)}
.count-val.ble-val{color:var(--purple)}
.count-lbl{font-size:.58rem;text-transform:uppercase;letter-spacing:.06em;color:var(--dim)}
.summary-controls{
  display:flex;align-items:center;gap:10px;
  padding:0 16px;flex:1;min-width:0;
  flex-wrap:nowrap;overflow:hidden;
}
.filter-pills{display:flex;gap:6px;flex-shrink:0}
.pill{
  font-size:.65rem;padding:3px 10px;border-radius:12px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);cursor:pointer;transition:all .15s;
  font-family:var(--font-mono);white-space:nowrap;
  user-select:none;
}
.pill:hover{border-color:var(--cyan);color:var(--cyan)}
.pill.active{background:rgba(0,212,255,.12);border-color:var(--cyan);color:var(--cyan)}
.sort-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.sort-lbl{font-size:.6rem;color:var(--dim);white-space:nowrap;font-family:var(--font-mono)}
.sort-select{
  background:var(--bg);border:1px solid var(--border);
  border-radius:6px;padding:4px 8px;color:var(--text);
  font-size:.65rem;font-family:var(--font-mono);outline:none;cursor:pointer;
}
.sort-select:focus{border-color:var(--cyan)}
.search-input{
  flex:1;min-width:120px;max-width:240px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:6px;padding:4px 10px;color:var(--text);
  font-size:.72rem;font-family:var(--font-mono);outline:none;
  margin-left:auto;
}
.search-input:focus{border-color:var(--cyan)}
.search-input::placeholder{color:var(--dim)}

/* ---- PROXIMITY LIST ---- */
.proximity-scroll{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ---- GROUP ---- */
.group{border-bottom:1px solid var(--border)}
.group-header{
  display:flex;align-items:center;gap:10px;
  padding:0 16px;height:36px;
  background:var(--bg);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;cursor:pointer;
  user-select:none;transition:background .12s;
}
.group-header:hover{background:#0d1220}
.group-distance{font-size:.7rem;font-weight:700;font-family:var(--font-mono);color:var(--cyan)}
.group-count{font-size:.62rem;color:var(--dim);font-family:var(--font-mono)}
.group-spacer{flex:1}
.group-chevron{
  width:14px;height:14px;color:var(--dim);flex-shrink:0;
  transition:transform .18s;
}
.group-chevron.open{transform:rotate(90deg)}
.group-body{overflow:hidden}
.group-body.collapsed{display:none}

/* ---- DEVICE ROW ---- */
.dev-row{
  display:flex;align-items:center;gap:8px;
  padding:0 16px;height:44px;
  border-bottom:1px solid rgba(30,45,74,.3);
  cursor:pointer;transition:background .1s;
  content-visibility:auto;contain-intrinsic-size:auto 44px;
}
.dev-row:hover{background:rgba(0,212,255,.04)}
.dev-row:focus{outline:2px solid var(--cyan);outline-offset:-2px;background:rgba(0,212,255,.07)}
.dev-row.expanded{background:rgba(0,212,255,.06)}

/* activity dot */
.activity-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
  transition:background-color .5s;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.activity-dot.live{animation:pulse 2s ease-in-out infinite}

/* device icon */
.dev-icon{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;opacity:.85}
.dev-icon svg{width:18px;height:18px;fill:#fff}

/* label */
.dev-label{flex:1;min-width:0;overflow:hidden}
.dev-name{font-size:.75rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.dev-sub{font-size:.62rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--font-mono)}

/* distance badge */
.dev-dist{
  width:52px;text-align:right;flex-shrink:0;
  font-size:.7rem;font-family:var(--font-mono);color:var(--muted);
}

/* signal bars */
.signal-bars{width:24px;flex-shrink:0;display:flex;align-items:flex-end;gap:2px;height:14px}
.bar{width:4px;border-radius:1px;background:var(--dim)}
.bar.lit{background:var(--cyan)}
.bar:nth-child(1){height:30%}
.bar:nth-child(2){height:50%}
.bar:nth-child(3){height:75%}
.bar:nth-child(4){height:100%}

/* protocol pill */
.proto-pill{
  width:36px;text-align:center;flex-shrink:0;
  font-size:.56rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
  padding:2px 0;border-radius:4px;
}
.proto-pill.wifi{background:rgba(59,130,246,.18);color:#7db8f7}
.proto-pill.ble{background:rgba(168,85,247,.18);color:#c084fc}

/* risk dot */
.risk-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.risk-dot.med{background:var(--warn)}
.risk-dot.high{background:var(--danger)}

/* expand chevron */
.expand-chevron{
  width:12px;height:12px;color:var(--dim);flex-shrink:0;
  transition:transform .15s;
}
.expand-chevron.open{transform:rotate(90deg)}

/* ---- DETAIL PANEL ---- */
.detail-panel{
  background:#0d1421;border-top:1px solid var(--border);
  padding:12px 16px 12px 52px;
  display:none;
}
.detail-panel.open{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px}
.detail-item{display:flex;flex-direction:column;gap:1px}
.detail-lbl{font-size:.58rem;text-transform:uppercase;letter-spacing:.06em;color:var(--dim)}
.detail-val{font-size:.7rem;font-family:var(--font-mono);color:var(--text)}
.detail-val.mono-mac{color:var(--cyan)}
.rand-badge{
  display:inline-block;font-size:.52rem;font-weight:700;
  padding:1px 5px;border-radius:3px;margin-left:5px;
  background:rgba(255,165,2,.15);color:var(--warn);
  vertical-align:middle;
}
.risk-pct{font-weight:700}
.risk-low{color:var(--success)}
.risk-med{color:var(--warn)}
.risk-high{color:var(--danger)}

/* empty state */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 20px;color:var(--dim);text-align:center;gap:10px;
}
.empty-state svg{opacity:.3}
.empty-state p{font-size:.8rem}
</style>
</head>
<body>
<header class="header">
  <div class="header-left">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M1.29 7.35a15.56 15.56 0 0 1 21.42 0l.6.58-1.42 1.42-.6-.58a13.56 13.56 0 0 0-18.58 0l-.6.58L.69 7.93l.6-.58Zm4.24 4.24a10.44 10.44 0 0 1 12.94 0l.6.5-1.42 1.42-.52-.42a8.44 8.44 0 0 0-10.26 0l-.52.42-1.42-1.42.6-.5Zm4.24 4.24a5.32 5.32 0 0 1 4.46 0l.68.42-1.42 1.42-.38-.24a3.32 3.32 0 0 0-2.22 0l-.38.24-1.42-1.42.68-.42ZM12 18a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3Z"/></svg>
      5map
    </div>
    <a href="visual-indicators.html" class="back-link">&#8592; Back</a>
    <span class="page-title">Device Proximity</span>
  </div>
  <span class="last-update" id="last-update">--:--:--</span>
</header>

<div class="summary-strip">
  <div class="summary-counts">
    <div class="count-item">
      <span class="count-val" id="cnt-total">--</span>
      <span class="count-lbl">Total</span>
    </div>
    <div class="count-item">
      <span class="count-val active-val" id="cnt-active">--</span>
      <span class="count-lbl">Active</span>
    </div>
    <div class="count-item">
      <span class="count-val wifi-val" id="cnt-wifi">--</span>
      <span class="count-lbl">WiFi</span>
    </div>
    <div class="count-item">
      <span class="count-val ble-val" id="cnt-ble">--</span>
      <span class="count-lbl">BLE</span>
    </div>
  </div>
  <div class="summary-controls">
    <div class="filter-pills" id="filter-pills">
      <button class="pill active" data-filter="all">All</button>
      <button class="pill" data-filter="wifi">WiFi</button>
      <button class="pill" data-filter="ble">BLE</button>
      <button class="pill" data-filter="ap">APs Only</button>
      <button class="pill" data-filter="risk">High Risk</button>
    </div>
    <div class="sort-wrap">
      <span class="sort-lbl">Sort:</span>
      <select class="sort-select" id="sort-select">
        <option value="distance">Distance</option>
        <option value="rssi">Signal</option>
        <option value="last_seen">Last Seen</option>
        <option value="risk">Risk</option>
      </select>
    </div>
    <input type="text" class="search-input" id="search-input" placeholder="Search MAC, SSID, vendor...">
  </div>
</div>

<div class="proximity-scroll" id="proximity-scroll" role="list" aria-label="Devices by proximity">
  <div class="empty-state" id="empty-state" hidden>
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <p>No devices match your search</p>
  </div>
</div>

<script>
(function() {
'use strict';

/* ---------- state ---------- */
var allDevices = [];
var currentFilter = 'all';
var currentSearch = '';
var currentSort = 'distance';
var expandedMacs = {};
var groupCollapsed = {};
var searchTimer = null;

/* ---------- distance bands ---------- */
var BANDS = [
  { id:'b0', label:'< 1m', hint:'Immediate',   min:0,   max:1,   defaultOpen:true  },
  { id:'b1', label:'1 – 3m', hint:'Close',     min:1,   max:3,   defaultOpen:true  },
  { id:'b2', label:'3 – 10m', hint:'Room',     min:3,   max:10,  defaultOpen:true  },
  { id:'b3', label:'10 – 20m', hint:'Extended',min:10,  max:20,  defaultOpen:false },
  { id:'b4', label:'> 20m', hint:'Far / Weak', min:20,  max:Infinity, defaultOpen:false }
];

/* ---------- data loading ---------- */
function estimateDistance(rssi, txPower, type) {
  var n = 2.7;
  var tx = txPower != null ? txPower : (type === 'ap' ? -40 : -59);
  return Math.min(Math.pow(10, (tx - rssi) / (10 * n)), 50);
}

async function loadData() {
  try {
    var res = await fetch('data.json?_=' + Date.now());
    var raw = await res.json();
    return parseData(raw);
  } catch(e) { return null; }
}

function parseData(raw) {
  function unwrap(v) {
    if (v === null || v === undefined) return v;
    if (typeof v !== 'object') return v;
    if (Array.isArray(v)) return v.map(unwrap);
    if ('S' in v) return v.S;
    if ('N' in v) return parseFloat(v.N);
    if ('BOOL' in v) return v.BOOL;
    if ('L' in v) return v.L.map(unwrap);
    if ('M' in v) { var o={}; for(var k in v.M) o[k]=unwrap(v.M[k]); return o; }
    var o={}; for(var k in v) o[k]=unwrap(v[k]); return o;
  }
  return unwrap(raw);
}

function buildAllDevices(data) {
  var result = [];
  (data.devices || []).forEach(function(d) {
    var dist = estimateDistance(d.rssi_dbm, null, d.device_type);
    result.push({
      mac: d.mac_address,
      vendor: d.vendor || 'Unknown',
      ssid: (!d.ssid || d.ssid === '-') ? 'Hidden' : d.ssid,
      rssi: d.rssi_dbm,
      channel: d.channel || 0,
      band: d.bandwidth || (d.channel > 14 ? '5GHz' : '2.4GHz'),
      type: d.device_type || 'unknown',
      proto: 'wifi',
      risk: parseFloat(d.risk_score) || 0,
      distance: Math.round(dist * 100) / 100,
      first_seen: d.first_seen,
      last_seen: d.last_seen,
      is_randomized_mac: d.is_randomized_mac,
      device_name: null,
      manufacturer: null,
      tx_power: null,
      connectable: null,
      _raw: d
    });
  });
  (data.bluetooth_devices || []).forEach(function(d) {
    var dist = estimateDistance(d.rssi_dbm, d.tx_power, 'phone');
    result.push({
      mac: d.mac_address,
      vendor: d.manufacturer || 'Unknown',
      ssid: d.device_name || '--',
      rssi: d.rssi_dbm,
      channel: '--',
      band: 'BLE',
      type: d.device_type || 'BLE',
      proto: 'bt',
      risk: 0.1,
      distance: Math.round(dist * 100) / 100,
      first_seen: d.first_seen,
      last_seen: d.last_seen,
      is_randomized_mac: false,
      device_name: d.device_name || null,
      manufacturer: d.manufacturer || null,
      tx_power: d.tx_power != null ? d.tx_power : null,
      connectable: d.connectable != null ? d.connectable : null,
      _raw: d
    });
  });
  return result;
}

/* ---------- helpers ---------- */
function ageSecs(ts) {
  if (!ts) return 0;
  return (Date.now() - new Date(ts).getTime()) / 1000;
}

function activityColor(lastSeen) {
  var age = ageSecs(lastSeen);
  if (age < 30)  return { color:'#2ed573', live:true  };
  if (age < 120) return { color:'#9ca3af', live:false };
  if (age < 300) return { color:'#6b7280', live:false };
  if (age < 900) return { color:'#4b5563', live:false };
  return             { color:'#374151', live:false };
}

function signalBars(rssi) {
  if (rssi >= -50) return 4;
  if (rssi >= -65) return 3;
  if (rssi >= -80) return 2;
  return 1;
}

function formatDist(d) {
  if (d < 1) return d.toFixed(2) + 'm';
  if (d < 10) return d.toFixed(1) + 'm';
  return Math.round(d) + 'm';
}

function formatTime(ts) {
  if (!ts) return '--';
  var d = new Date(ts);
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function isActive(d) { return ageSecs(d.last_seen) < 30; }

/* ---------- SVG icons (monochrome, inline) ---------- */
var ICONS = {
  ap: '<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M3.05 4.95a10 10 0 0 1 13.9 0l-1.42 1.42a8 8 0 0 0-11.06 0L3.05 4.95Zm2.83 2.83a6 6 0 0 1 8.24 0l-1.42 1.42a4 4 0 0 0-5.4 0L5.88 7.78Zm2.83 2.83a2 2 0 0 1 2.58 0l-1.29 1.3-.29-.3-.29.29L8.71 10.61ZM10 13a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3Z"/></svg>',
  phone: '<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="2" width="8" height="16" rx="2"/><circle cx="10" cy="15.5" r="1" fill="var(--bg)"/></svg>',
  laptop: '<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="5" width="14" height="9" rx="1.5"/><path d="M1 15h18v1a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1v-1Z"/></svg>',
  bt: '<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 3v14M10 3l4 4-4 4M10 11l4 4-4 4M10 7l-4 4 4 0M10 11l-4-4 4 0" stroke-width="1.6" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  unknown: '<svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="10" r="7" stroke="currentColor" fill="none" stroke-width="1.6"/><text x="10" y="14" text-anchor="middle" font-size="9" fill="currentColor">?</text></svg>'
};

function deviceIcon(d) {
  if (d.proto === 'bt') return ICONS.bt;
  var t = (d.type || '').toLowerCase();
  if (t === 'ap') return ICONS.ap;
  if (t === 'phone') return ICONS.phone;
  if (t === 'laptop') return ICONS.laptop;
  return ICONS.unknown;
}

function deviceLabel(d) {
  if (d.proto === 'wifi' && d.type === 'ap') return d.ssid;
  if (d.proto === 'wifi') return (d.vendor !== 'Unknown' ? d.vendor + ' ' : '') + d.mac.slice(-4);
  if (d.device_name && d.device_name !== '--') return d.device_name;
  if (d.manufacturer && d.manufacturer !== 'Unknown') return d.manufacturer;
  return 'BLE ' + d.mac.slice(-4);
}

function deviceSub(d) {
  if (d.proto === 'wifi' && d.type === 'ap') return d.vendor + ' · ' + d.band + ' ch' + d.channel;
  if (d.proto === 'wifi') return d.mac;
  return d.mac;
}

/* ---------- filtering & sorting ---------- */
function matchesFilter(d) {
  if (currentFilter === 'wifi') return d.proto === 'wifi';
  if (currentFilter === 'ble')  return d.proto === 'bt';
  if (currentFilter === 'ap')   return d.proto === 'wifi' && d.type === 'ap';
  if (currentFilter === 'risk') return d.risk >= 0.3;
  return true;
}

function matchesSearch(d) {
  if (!currentSearch) return true;
  var q = currentSearch.toLowerCase();
  return (d.mac || '').toLowerCase().includes(q) ||
         (d.ssid || '').toLowerCase().includes(q) ||
         (d.vendor || '').toLowerCase().includes(q) ||
         (d.device_name || '').toLowerCase().includes(q) ||
         (d.manufacturer || '').toLowerCase().includes(q);
}

function sortDevices(list) {
  return list.slice().sort(function(a, b) {
    if (currentSort === 'distance') return a.distance - b.distance;
    if (currentSort === 'rssi')     return b.rssi - a.rssi;
    if (currentSort === 'risk')     return b.risk - a.risk;
    if (currentSort === 'last_seen') {
      var ta = a.last_seen ? new Date(a.last_seen).getTime() : 0;
      var tb = b.last_seen ? new Date(b.last_seen).getTime() : 0;
      return tb - ta;
    }
    return 0;
  });
}

/* ---------- rendering ---------- */
function buildBarsHTML(rssi) {
  var bars = signalBars(rssi);
  var h = '';
  for (var i = 1; i <= 4; i++) h += '<div class="bar' + (i <= bars ? ' lit' : '') + '"></div>';
  return '<div class="signal-bars" aria-label="' + bars + ' bars signal">' + h + '</div>';
}

function buildRowHTML(d) {
  var ac = activityColor(d.last_seen);
  var bars = buildBarsHTML(d.rssi);
  var icon = deviceIcon(d);
  var label = deviceLabel(d);
  var sub = deviceSub(d);
  var proto = d.proto === 'bt' ? 'ble' : 'wifi';
  var protoLabel = d.proto === 'bt' ? 'BLE' : 'WiFi';
  var riskDot = '';
  if (d.risk >= 0.6) riskDot = '<span class="risk-dot high" title="High risk ' + (d.risk*100).toFixed(0) + '%"></span>';
  else if (d.risk >= 0.3) riskDot = '<span class="risk-dot med" title="Medium risk ' + (d.risk*100).toFixed(0) + '%"></span>';
  var isExp = expandedMacs[d.mac] ? ' expanded' : '';
  var chevDir = expandedMacs[d.mac] ? ' open' : '';

  return '<div class="dev-row' + isExp + '" data-mac="' + esc(d.mac) + '" tabindex="0" role="listitem" aria-expanded="' + (expandedMacs[d.mac] ? 'true' : 'false') + '">' +
    '<span class="activity-dot' + (ac.live ? ' live' : '') + '" style="background:' + ac.color + '" title="' + (ac.live ? 'Active' : 'Stale') + '"></span>' +
    '<span class="dev-icon">' + icon + '</span>' +
    '<span class="dev-label"><div class="dev-name">' + esc(label) + '</div><div class="dev-sub">' + esc(sub) + '</div></span>' +
    '<span class="dev-dist">' + formatDist(d.distance) + '</span>' +
    bars +
    '<span class="proto-pill ' + proto + '">' + protoLabel + '</span>' +
    riskDot +
    '<svg class="expand-chevron' + chevDir + '" viewBox="0 0 12 12" fill="none"><path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
    '</div>' +
    buildDetailHTML(d);
}

function buildDetailHTML(d) {
  var open = expandedMacs[d.mac] ? ' open' : '';
  var riskPct = (d.risk * 100).toFixed(0) + '%';
  var riskCls = d.risk >= 0.6 ? 'risk-high' : d.risk >= 0.3 ? 'risk-med' : 'risk-low';
  var randBadge = d.is_randomized_mac ? '<span class="rand-badge">RAND</span>' : '';

  var extraFields = '';
  if (d.proto === 'wifi') {
    extraFields =
      '<div class="detail-item"><span class="detail-lbl">Channel</span><span class="detail-val">' + esc(String(d.channel)) + '</span></div>' +
      '<div class="detail-item"><span class="detail-lbl">Band</span><span class="detail-val">' + esc(d.band) + '</span></div>';
  } else {
    if (d.manufacturer) extraFields += '<div class="detail-item"><span class="detail-lbl">Manufacturer</span><span class="detail-val">' + esc(d.manufacturer) + '</span></div>';
    if (d.tx_power != null) extraFields += '<div class="detail-item"><span class="detail-lbl">TX Power</span><span class="detail-val">' + d.tx_power + ' dBm</span></div>';
    if (d.connectable != null) extraFields += '<div class="detail-item"><span class="detail-lbl">Connectable</span><span class="detail-val">' + (d.connectable ? 'Yes' : 'No') + '</span></div>';
  }

  return '<div class="detail-panel' + open + '" data-detail="' + esc(d.mac) + '">' +
    '<div class="detail-item"><span class="detail-lbl">MAC</span><span class="detail-val mono-mac">' + esc(d.mac) + randBadge + '</span></div>' +
    '<div class="detail-item"><span class="detail-lbl">Vendor / Mfr</span><span class="detail-val">' + esc(d.vendor) + '</span></div>' +
    extraFields +
    '<div class="detail-item"><span class="detail-lbl">First Seen</span><span class="detail-val">' + formatTime(d.first_seen) + '</span></div>' +
    '<div class="detail-item"><span class="detail-lbl">Last Seen</span><span class="detail-val">' + formatTime(d.last_seen) + '</span></div>' +
    '<div class="detail-item"><span class="detail-lbl">Risk</span><span class="detail-val risk-pct ' + riskCls + '">' + riskPct + '</span></div>' +
    '</div>';
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  var scroll = document.getElementById('proximity-scroll');
  var empty = document.getElementById('empty-state');
  var visible = allDevices.filter(function(d){ return matchesFilter(d) && matchesSearch(d); });

  updateCounts(visible);

  if (visible.length === 0) {
    scroll.innerHTML = '';
    scroll.appendChild(empty);
    empty.hidden = false;
    return;
  }
  empty.hidden = true;

  var sorted = sortDevices(visible);
  var html = '';
  BANDS.forEach(function(band) {
    var devs = sorted.filter(function(d){ return d.distance >= band.min && d.distance < band.max; });
    if (devs.length === 0) return;
    var collapsed = groupCollapsed[band.id] !== undefined ? groupCollapsed[band.id] : !band.defaultOpen;
    var bodyClass = collapsed ? ' collapsed' : '';
    var chevClass = collapsed ? '' : ' open';
    html += '<div class="group" data-group="' + band.id + '">';
    html += '<div class="group-header" data-toggle="' + band.id + '">';
    html += '<svg class="group-chevron' + chevClass + '" viewBox="0 0 12 12" fill="none"><path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    html += '<span class="group-distance">' + band.label + '</span>';
    html += '<span class="group-count">' + devs.length + ' device' + (devs.length !== 1 ? 's' : '') + ' &middot; ' + band.hint + '</span>';
    html += '<span class="group-spacer"></span>';
    html += '</div>';
    html += '<div class="group-body' + bodyClass + '">';
    devs.forEach(function(d){ html += buildRowHTML(d); });
    html += '</div></div>';
  });

  scroll.innerHTML = html;
  if (!empty.parentNode || empty.parentNode !== scroll) scroll.appendChild(empty);

  attachRowEvents(scroll);
}

function updateCounts(visible) {
  var now = Date.now();
  var active = allDevices.filter(function(d){ return ageSecs(d.last_seen) < 30; }).length;
  var wifi = allDevices.filter(function(d){ return d.proto === 'wifi'; }).length;
  var ble = allDevices.filter(function(d){ return d.proto === 'bt'; }).length;
  document.getElementById('cnt-total').textContent = allDevices.length;
  document.getElementById('cnt-active').textContent = active;
  document.getElementById('cnt-wifi').textContent = wifi;
  document.getElementById('cnt-ble').textContent = ble;
}

function attachRowEvents(scroll) {
  scroll.querySelectorAll('.group-header').forEach(function(hdr) {
    hdr.addEventListener('click', function() {
      var gid = hdr.dataset.toggle;
      var body = scroll.querySelector('.group[data-group="' + gid + '"] .group-body');
      var chevron = hdr.querySelector('.group-chevron');
      var isCollapsed = body.classList.contains('collapsed');
      if (isCollapsed) {
        body.classList.remove('collapsed');
        chevron.classList.add('open');
        groupCollapsed[gid] = false;
      } else {
        body.classList.add('collapsed');
        chevron.classList.remove('open');
        groupCollapsed[gid] = true;
      }
    });
  });

  scroll.querySelectorAll('.dev-row').forEach(function(row) {
    row.addEventListener('click', function(e) { toggleRow(row, e); });
    row.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { toggleRow(row, e); }
      if (e.key === 'Escape') { collapseRow(row); }
      if (e.key === 'ArrowDown') { e.preventDefault(); focusNext(row, 1); }
      if (e.key === 'ArrowUp')   { e.preventDefault(); focusNext(row, -1); }
    });
  });
}

function toggleRow(row, e) {
  var mac = row.dataset.mac;
  var detail = row.nextElementSibling;
  if (!detail || !detail.classList.contains('detail-panel')) return;
  var isOpen = expandedMacs[mac];
  expandedMacs[mac] = !isOpen;
  if (!isOpen) {
    row.classList.add('expanded');
    row.setAttribute('aria-expanded', 'true');
    detail.classList.add('open');
    row.querySelector('.expand-chevron').classList.add('open');
  } else {
    row.classList.remove('expanded');
    row.setAttribute('aria-expanded', 'false');
    detail.classList.remove('open');
    row.querySelector('.expand-chevron').classList.remove('open');
  }
}

function collapseRow(row) {
  var mac = row.dataset.mac;
  if (!expandedMacs[mac]) return;
  expandedMacs[mac] = false;
  var detail = row.nextElementSibling;
  row.classList.remove('expanded');
  row.setAttribute('aria-expanded', 'false');
  if (detail) detail.classList.remove('open');
  row.querySelector('.expand-chevron').classList.remove('open');
}

function focusNext(current, dir) {
  var scroll = document.getElementById('proximity-scroll');
  var rows = Array.from(scroll.querySelectorAll('.dev-row'));
  var idx = rows.indexOf(current);
  var next = rows[idx + dir];
  if (next) next.focus();
}

/* ---------- live dot updates (no full re-render) ---------- */
function updateDots() {
  var scroll = document.getElementById('proximity-scroll');
  scroll.querySelectorAll('.dev-row').forEach(function(row) {
    var mac = row.dataset.mac;
    var d = allDevices.find(function(x){ return x.mac === mac; });
    if (!d) return;
    var dot = row.querySelector('.activity-dot');
    if (!dot) return;
    var ac = activityColor(d.last_seen);
    dot.style.backgroundColor = ac.color;
    if (ac.live && !dot.classList.contains('live')) dot.classList.add('live');
    else if (!ac.live && dot.classList.contains('live')) dot.classList.remove('live');
  });
  updateCounts(allDevices);
}

/* ---------- events ---------- */
document.getElementById('filter-pills').addEventListener('click', function(e) {
  var pill = e.target.closest('.pill');
  if (!pill) return;
  document.querySelectorAll('.pill').forEach(function(p){ p.classList.remove('active'); });
  pill.classList.add('active');
  currentFilter = pill.dataset.filter;
  render();
});

document.getElementById('sort-select').addEventListener('change', function(e) {
  currentSort = e.target.value;
  render();
});

document.getElementById('search-input').addEventListener('input', function(e) {
  clearTimeout(searchTimer);
  var val = e.target.value;
  searchTimer = setTimeout(function() {
    currentSearch = val;
    render();
  }, 200);
});

/* ---------- init & refresh ---------- */
async function init() {
  var data = await loadData();
  if (!data) return;
  allDevices = buildAllDevices(data);
  document.getElementById('last-update').textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  render();

  setInterval(async function() {
    var d = await loadData();
    if (!d) return;
    var scrollEl = document.getElementById('proximity-scroll');
    var scrollTop = scrollEl.scrollTop;

    var prevDevs = allDevices;
    allDevices = buildAllDevices(d);
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});

    var prevCount = prevDevs.length;
    var newCount = allDevices.length;
    var prevMacs = prevDevs.map(function(x){ return x.mac; }).sort().join(',');
    var newMacs = allDevices.map(function(x){ return x.mac; }).sort().join(',');

    if (prevMacs !== newMacs || prevCount !== newCount) {
      render();
      scrollEl.scrollTop = scrollTop;
    } else {
      updateDots();
    }
  }, 3000);
}

window.addEventListener('load', init);
})();
</script>
</body>
</html>
